name: Update YouTube Title

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run updater
        env:
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          TOKEN: ${{ secrets.TOKEN }}
        run: node updater.js
        
      - name: Keep repo alive
        run: |
          date > .last-run
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .last-run
          git diff --cached --quiet || git commit -m "heartbeat: $(date -u +%Y-%m-%d-%H:%M:%S)"
          git push
